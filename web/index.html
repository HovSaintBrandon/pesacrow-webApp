  <style>
    body {
      background-color: #0A0A0A;
      margin: 0;

    }
    .loading-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: transparent;
      z-index: 10;
      position: relative;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }
    .loading-logo {
      width: 120px;
      height: auto;
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }

<body>
  <canvas id="particle-canvas"></canvas>
  <div id="loading" class="loading-container">
    <img src="favicon.png" class="loading-logo" alt="PesaCrow Logo">
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // The loading indicator can be removed when the app is ready
      var loader = document.getElementById('loading');
      function removeLoader() {
        if (!loader) return;
        loader.style.transition = 'opacity 0.5s ease-out';
        loader.style.opacity = '0';
        // Allow clicks to pass through immediately
        loader.style.pointerEvents = 'none';
        setTimeout(function() {
          if (loader && loader.parentNode) {
            loader.parentNode.removeChild(loader);
          }
        }, 500);
        loader = null;
      }

      // Check if flutter is already rendered
      if (document.querySelector('flutter-view') || document.querySelector('flt-glass-pane')) {
        removeLoader();
      } else {
        // Observe body for flutter initialization
        var observer = new MutationObserver(function(mutations) {
          for (var i = 0; i < mutations.length; i++) {
            var added = mutations[i].addedNodes;
            for (var j = 0; j < added.length; j++) {
              var node = added[j];
              if (node.tagName === 'FLUTTER-VIEW' || node.tagName === 'FLT-GLASS-PANE') {
                removeLoader();
                observer.disconnect();
                return;
              }
            }
          }
        });
        observer.observe(document.body, { childList: true });
      }
    });

    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resize);
      resize();

      const logoImg = new Image();
      // Try resolving asset from flutter structure first
      logoImg.src = 'assets/assets/mpesacrowlogo.png';
      logoImg.onerror = function() {
        // Fallback for raw html viewing or different paths
        logoImg.src = 'assets/mpesacrowlogo.png';
      };

      const particles = [];
      const particleCount = window.innerWidth < 768 ? 200 : 600; // Responsive particle amount

      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 5 + 3, // Tiny to medium sizes for star effect
          speedX: (Math.random() - 0.5) * 0.2, // Very slow movement
          speedY: (Math.random() - 0.5) * 0.2,
          opacity: Math.random() * 0.5 + 0.1,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.02
        });
      }

      const shootingStars = [];
      function createShootingStar() {
        shootingStars.push({
          x: Math.random() * width,
          y: 0,
          length: Math.random() * 80 + 30,
          speed: Math.random() * 10 + 8,
          opacity: 1,
          angle: Math.PI / 4 + (Math.random() * 0.2 - 0.1) // Diagonal
        });
      }

      setInterval(() => {
        if (Math.random() > 0.4) createShootingStar();
      }, 3000);

      function animate() {
        ctx.clearRect(0, 0, width, height);

        if (logoImg.complete && logoImg.naturalWidth !== 0) {
          for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            p.x += p.speedX;
            p.y += p.speedY;
            p.rotation += p.rotationSpeed;

            // Twinkle effect
            if (Math.random() < 0.005) {
                p.opacity = Math.random() * 0.5 + 0.5;
            } else {
                p.opacity *= 0.99; // Slowly dim back to normal
                if(p.opacity < 0.1) p.opacity = 0.1;
            }

            // Wrap around
            if (p.x < -p.size) p.x = width + p.size;
            if (p.x > width + p.size) p.x = -p.size;
            if (p.y < -p.size) p.y = height + p.size;
            if (p.y > height + p.size) p.y = -p.size;

            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rotation);
            ctx.globalAlpha = p.opacity;
            ctx.drawImage(logoImg, -p.size / 2, -p.size / 2, p.size, p.size);
            ctx.restore();
          }
        }

        // Draw shooting stars
        for (let i = 0; i < shootingStars.length; i++) {
          let s = shootingStars[i];
          s.x += Math.cos(s.angle) * s.speed;
          s.y += Math.sin(s.angle) * s.speed;
          s.opacity -= 0.015;

          if (s.opacity <= 0 || s.x > width || s.y > height) {
            shootingStars.splice(i, 1);
            i--;
            continue;
          }

          ctx.save();
          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(s.x - Math.cos(s.angle) * s.length, s.y - Math.sin(s.angle) * s.length);
          let grad = ctx.createLinearGradient(s.x, s.y, s.x - Math.cos(s.angle) * s.length, s.y - Math.sin(s.angle) * s.length);
          grad.addColorStop(0, `rgba(255, 255, 255, ${s.opacity})`);
          grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
          ctx.strokeStyle = grad;
          ctx.lineWidth = 1.5;
          ctx.stroke();
          ctx.restore();
        }

        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
