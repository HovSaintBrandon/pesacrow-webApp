<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Secure digital escrow for M-Pesa. Trust them so you don't have to.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PesaCrow">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PesaCrow | Secure M-Pesa Escrow</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      background-color: #0A0A0A;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .loading-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #0A0A0A;
    }
    .loading-logo {
      width: 120px;
      height: auto;
      animation: pulse 2s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <img src="favicon.png" class="loading-logo" alt="PesaCrow Logo">
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // The loading indicator can be removed when the app is ready
      // Flutter bootstrap does its own thing, but we can ensure the div is manageable
    });
  </script>
</body>
</html>
